version: '3.8'

services:
  kai-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kai-os-api
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "8765:8765"  # WebSocket
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist data and logs
      - ./Data:/app/Data
      - ./logs:/app/logs
      # Mount credentials (don't bake into image!)
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Optional: Redis for caching/rate limiting
  # redis:
  #   image: redis:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

# volumes:
#   redis_data:

networks:
  default:
    name: kai-os-network
