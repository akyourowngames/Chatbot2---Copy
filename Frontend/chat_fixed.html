<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI - Premium Chat Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Frontend/components.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --primary-dark: #0099ff;
            --secondary: #7c3aed;
            --success: #10b981;
            --bg-dark: #0a0e27;
            --bg-darker: #060918;
            --bg-sidebar: rgba(10, 14, 39, 0.95);
            --bg-chat: rgba(15, 23, 42, 0.4);
            --bg-message-user: rgba(0, 212, 255, 0.08);
            --bg-message-ai: rgba(124, 58, 237, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --glow: rgba(0, 212, 255, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(124, 58, 237, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .new-chat-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 14px 16px;
            margin: 6px 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(0, 212, 255, 0.05);
            color: var(--text-primary);
            border-color: rgba(0, 212, 255, 0.2);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(124, 58, 237, 0.1));
            color: var(--text-primary);
            border-color: rgba(0, 212, 255, 0.3);
            font-weight: 500;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .settings-btn {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            text-align: left;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-btn:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.2);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        /* Main Chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px) saturate(180%);
            background: rgba(10, 14, 39, 0.6);
        }

        .model-selector {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 10px 18px;
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .model-selector:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(148, 163, 184, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .icon-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-btn:active {
            transform: translateY(0) scale(0.95);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 800px;
            margin: 0 auto 24px;
            display: flex;
            gap: 16px;
            padding: 20px;
            border-radius: 16px;
            animation: messageSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s ease;
        }

        .message:hover {
            transform: translateY(-2px);
        }

        .message.user {
            background: var(--bg-message-user);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }

        .message.assistant {
            background: var(--bg-message-ai);
            border: 1px solid rgba(124, 58, 237, 0.15);
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .message:hover .message-avatar {
            transform: scale(1.1) rotate(5deg);
        }

        .user .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .assistant .message-avatar {
            background: linear-gradient(135deg, var(--secondary), #9333ea);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .message-content {
            flex: 1;
            line-height: 1.7;
            font-size: 15px;
            color: var(--text-primary);
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Input Area */
        .input-area {
            padding: 24px 28px;
            background: rgba(10, 14, 39, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid var(--border);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: rgba(148, 163, 184, 0.05);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            padding: 14px 16px;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
            background: rgba(0, 212, 255, 0.03);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            max-height: 200px;
            min-height: 24px;
            font-family: inherit;
            line-height: 1.6;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }

        .send-btn:active {
            transform: translateY(0) scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Quick Actions */
        .quick-actions {
            max-width: 800px;
            margin: 28px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .quick-action {
            background: var(--bg-chat);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .quick-action:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.2);
        }

        .quick-action-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .quick-action-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 48px 24px;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease;
        }

        .welcome h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .welcome p {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 36px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--secondary), var(--primary));
        }

        /* Animations */
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
            }

            .sidebar.open {
                left: 0;
            }

            .chat-header {
                padding: 16px 20px;
            }

            .messages {
                padding: 20px 16px;
            }

            .input-area {
                padding: 16px;
            }

            .quick-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>➕</span>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
            <div class="sidebar-footer">
                <button class="settings-btn" onclick="openSettings()">
                    ⚙️ Settings
                </button>
                <button class="settings-btn" onclick="window.open('dashboard.html')">
                    📊 Dashboard
                </button>
            </div>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="chat-header">
                <select class="model-selector" id="modelSelector">
                    <option value="jarvis">JARVIS AI v7.0</option>
                    <option value="fast">Fast Mode</option>
                    <option value="creative">Creative Mode</option>
                </select>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleVoice()" title="Voice Input">🎤</button>
                    <button class="icon-btn" onclick="fileManager.toggle()" title="Files">📁</button>
                    <button class="icon-btn" onclick="exportChat()" title="Export Chat">💾</button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <h1>⚡ JARVIS AI</h1>
                    <p>Your premium AI assistant with advanced capabilities</p>

                    <div class="quick-actions">
                        <div class="quick-action" onclick="sendQuickMessage('What can you do?')">
                            <div class="quick-action-title">💡 Capabilities</div>
                            <div class="quick-action-desc">Discover JARVIS features</div>
                        </div>
                        <div class="quick-action" onclick="sendQuickMessage('Start workday workflow')">
                            <div class="quick-action-title">🚀 Start Workday</div>
                            <div class="quick-action-desc">Begin productive day</div>
                        </div>
                        <div class="quick-action" onclick="sendQuickMessage('What\\'s Bitcoin price?')">
                            <div class="quick-action-title">💰 Live Data</div>
                            <div class="quick-action-desc">Real-time information</div>
                        </div>
                        <div class="quick-action" onclick="sendQuickMessage('Help me automate tasks')">
                            <div class="quick-action-title">⚡ Automation</div>
                            <div class="quick-action-desc">Automate workflows</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea class="input-field" id="messageInput" placeholder="Message JARVIS..." rows="1"
                        onkeydown="handleKeyPress(event)" oninput="autoResize(this)"></textarea>
                    <div class="input-buttons">
                        <button class="icon-btn" onclick="attachFile()" title="Attach">📎</button>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/v1';
        const API_KEY = 'demo_key_12345';
        let currentChatId = Date.now();
        let chatHistory = [];
        let isListening = false;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            document.getElementById('welcome')?.remove();
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            const typingId = addTypingIndicator();

            try {
                // Check if it's an image generation request
                if (message.toLowerCase().startsWith('generate image') || message.toLowerCase().startsWith('create image')) {
                    const response = await fetch(`${API_URL}/image/generate`, {
                        method: 'POST',
                        headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: message })
                    });
                    const data = await response.json();
                    removeTypingIndicator(typingId);

                    if (data.status === 'success' && data.images) {
                        data.images.forEach(imgUrl => {
                            addImageMessage('assistant', `http://localhost:5000${imgUrl}`);
                        });
                        addMessage('assistant', `Generated images for: "${message}"`);
                    } else {
                        addMessage('assistant', data.error || 'Failed to generate image.');
                    }
                    return;
                }

                // Normal Chat
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: message })
                });

                const data = await response.json();
                removeTypingIndicator(typingId);
                addMessage('assistant', data.response || 'Sorry, I encountered an error.');


                // Text to Speech (only for non-command responses)
                if (!data.command_executed) {
                    fetch(`${API_URL}/speech/synthesize`, {
                        method: 'POST',
                        headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: data.response })
                    }).catch(err => console.log('TTS skipped'));
                }

                saveChatHistory(message, data.response);

            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'Connection error. Make sure the API server is running.');
            }
        }

        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${formatMessage(content)}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addImageMessage(role, imageUrl) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <img src="${imageUrl}" style="max-width: 100%; border-radius: 12px; border: 1px solid var(--border);">
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function formatMessage(text) {
            if (!text) return '';
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            const id = 'typing-' + Date.now();
            typingDiv.id = id;
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            document.getElementById(id)?.remove();
        }

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function newChat() {
            currentChatId = Date.now();
            document.getElementById('messages').innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>⚡ JARVIS AI</h1>
                    <p>Your premium AI assistant with advanced capabilities</p>
                </div>
            `;
        }

        function saveChatHistory(userMsg, assistantMsg) {
            chatHistory.push({
                id: currentChatId,
                user: userMsg,
                assistant: assistantMsg,
                timestamp: new Date().toISOString()
            });
            updateChatHistorySidebar();
        }

        function updateChatHistorySidebar() {
            const historyDiv = document.getElementById('chatHistory');
            const chats = {};

            chatHistory.forEach(chat => {
                if (!chats[chat.id]) {
                    chats[chat.id] = chat.user.substring(0, 30) + '...';
                }
            });

            historyDiv.innerHTML = Object.entries(chats).map(([id, title]) => `
                <div class="chat-item ${id == currentChatId ? 'active' : ''}" onclick="loadChat(${id})">
                    ${title}
                </div>
            `).join('');
        }

        async function toggleVoice() {
            const btn = document.querySelector('.icon-btn[title="Voice Input"]');
            if (isListening) return;

            isListening = true;
            btn.style.color = '#ef4444'; // Red color
            btn.style.borderColor = '#ef4444';

            try {
                const response = await fetch(`${API_URL}/speech/recognize`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('messageInput').value = data.text;
                    sendMessage();
                } else {
                    alert('Could not hear anything. Please try again.');
                }
            } catch (error) {
                console.error('Voice error:', error);
                alert('Voice module not ready. Starting it up...');
            } finally {
                isListening = false;
                btn.style.color = '';
                btn.style.borderColor = '';
            }
        }

        function exportChat() {
            const text = chatHistory.map(chat =>
                `User: ${chat.user}\nAssistant: ${chat.assistant}\n\n`
            ).join('');

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'jarvis-chat-' + Date.now() + '.txt';
            a.click();
        }

        function openSettings() {
            alert('Settings panel coming soon!');
        }

        async function attachFile() {
    // Create file input
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '*/*'; // Accept all file types

    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Show uploading message
        addMessage('user', `📎 Uploading: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`);
        const typingId = addTypingIndicator();

        try {
            // Create FormData
            const formData = new FormData();
            formData.append('file', file);
            formData.append('question', 'Describe this image in detail');
            formData.append('auto_analyze', 'true');

            // Upload file
            const response = await fetch(`${API_URL}/files/upload`, {
                method: 'POST',
                headers: {
                    'X-API-Key': API_KEY
                },
                body: formData
            });

            const data = await response.json();
            removeTypingIndicator(typingId);

            if (data.success) {
                const fileInfo = data.file;
                const analysis = data.analysis;

                // Format analysis message
                let message = `✅ **File Uploaded Successfully**\n\n`;
                message += `📄 **Filename:** ${fileInfo.filename}\n`;
                message += `📊 **Type:** ${fileInfo.type}\n`;
                message += `💾 **Size:** ${fileInfo.size_mb} MB\n\n`;

                if (fileInfo.type === 'image' && analysis && analysis.success) {
                    message += `🤖 **AI Vision Analysis:**\n\n`;
                    if (analysis.caption) {
                        message += `**Caption:** ${analysis.caption}\n\n`;
                    }
                    if (analysis.ocr_text && analysis.ocr_text.trim()) {
                        message += `📝 **Text in Image:**\n${analysis.ocr_text.substring(0, 200)}${analysis.ocr_text.length > 200 ? '...' : ''}\n\n`;
                    }
                    if (analysis.answer) {
                        message += `💬 **AI Analysis:**\n${analysis.answer}\n\n`;
                    }
                    if (analysis.metadata) {
                        message += `⚙️ **Processing:** ${analysis.metadata.model}, ${analysis.metadata.processing_time_ms}ms\n`;
                    }
                } else if (fileInfo.type === 'image') {
                    message += `📸 **Image uploaded**\n`;
                }

                addMessage('assistant', message);

                // Show the image
                if (fileInfo.type === 'image') {
                    const imageUrl = `http://localhost:5000/data/Uploads/${fileInfo.filename}`;
                    addImageMessage('assistant', imageUrl);
                }
            } else {
                addMessage('assistant', `❌ Upload failed: ${data.error}`);
            }
        } catch (error) {
            removeTypingIndicator(typingId);
            addMessage('assistant', `❌ Error uploading file: ${error.message}`);
        }
    };

    input.click();
}


        document.getElementById('messageInput').focus();
    </script>
