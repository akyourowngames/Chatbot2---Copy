    <style>
        :root {
            --primary: #6366f1;
            --primary-dim: rgba(99, 102, 241, 0.1);
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #00f0ff;
            --danger: #ff003c;
            --surface-dark: #050505;
            --surface-panel: #0a0a0c;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 60;
            opacity: 0.1;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 55;
            opacity: 0.3;
        }

        .ambient-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .cyber-grid {
            position: fixed;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 40s linear infinite;
            z-index: 0;
            pointer-events: none;
            mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 80%);
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        .cut-corner {
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cut-corner-br {
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
        }

        .cut-corner-top {
            clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
        }

        .glitch-text {
            position: relative;
            font-family: var(--font-mono);
        }

        .sidebar-bg {
            background: rgba(5, 5, 7, 0.98);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .msg-block {
            animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            padding: 20px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-block.assistant {
            border-left: 2px solid var(--primary);
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.03) 0%, transparent 100%);
        }

        .msg-block.user {
            border-right: 2px solid rgba(255, 255, 255, 0.2);
            background: linear-gradient(-90deg, rgba(255, 255, 255, 0.01) 0%, transparent 100%);
        }

        .tactical-console {
            background: rgba(8, 8, 10, 0.95);
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.6);
        }

        .console-input {
            background: transparent;
            border: none;
            color: white;
            font-family: var(--font-mono);
            width: 100%;
            resize: none;
            outline: none;
        }

        .auth-panel {
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .status-dot.busy {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .hud-border-tl {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border-top: 1px solid var(--primary);
            border-left: 1px solid var(--primary);
            opacity: 0.6;
        }

        .hud-border-tr {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-top: 1px solid var(--primary);
            border-right: 1px solid var(--primary);
            opacity: 0.6;
        }

        .hud-border-bl {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 12px;
            height: 12px;
            border-bottom: 1px solid var(--primary);
            border-left: 1px solid var(--primary);
            opacity: 0.6;
        }

        .hud-border-br {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-bottom: 1px solid var(--primary);
            border-right: 1px solid var(--primary);
            opacity: 0.6;
        }

        /* Overlay Mode Styles */
        body.overlay-mode {
            background: transparent !important;
        }

        body.overlay-mode .cyber-grid,
        body.overlay-mode .noise-overlay,
        body.overlay-mode .ambient-glow,
        body.overlay-mode .scan-line {
            display: none !important;
        }

        body.overlay-mode #main-interface header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            height: 48px;
        }

        body.overlay-mode #chat-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            margin: 0;
        }

        body.overlay-mode .tactical-console {
            background: rgba(5, 5, 7, 0.9);
            backdrop-filter: blur(20px);
        }

        @media (max-width: 1024px) {
            #sidebar {
                transform: translateX(-100%);
            }

            #sidebar.open {
                transform: translateX(0);
            }
        }
    </style>

                        <button id="voice-btn" onclick="toggleVoice()"
                            class="h-12 w-12 flex items-center justify-center text-white/30 hover:text-red-500 transition-colors">
                            <i data-lucide="mic" class="w-6 h-6"></i>
                        </button>
                        <button onclick="sendMessage()"
                            class="h-12 px-8 bg-indigo-600 hover:bg-indigo-500 text-white font-mono text-[10px] font-black uppercase tracking-[0.3em] transition-all hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] cut-corner-br">
                            Execute
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="notification-area" class="fixed top-20 right-6 w-80 z-[200] space-y-3 pointer-events-none"></div>

    <script src="index.tsx" type="module"></script>
    <script>
        lucide.createIcons();
        const input = document.getElementById('messageInput');
        if (input) {
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 200) + 'px';
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    window.sendMessage();
                }
            });
        }
    </script>

</body>

</html>
